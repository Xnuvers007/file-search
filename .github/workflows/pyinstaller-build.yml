name: PyInstaller Build and Release

on:
  push:
    tags:
      - "V*" # Jalan hanya saat push tag seperti v1.2.0
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 3. Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller scikit-learn pymupdf

      - name: 4. Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      # ✅ UPX setup for Windows/Linux
      - name: 5a. Setup UPX for Windows/Linux
        if: matrix.os != 'macos-latest'
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          install-only: true

      # ✅ UPX setup for macOS
      - name: 5b. Install UPX on macOS
        if: matrix.os == 'macos-latest'
        run: brew install upx

      - name: 6. Build with PyInstaller
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            pyinstaller --noconfirm --clean --windowed \
              --upx-exclude "torch.dll" --upx-exclude "torch_cpu.dll" --upx-exclude "torch_python.dll" \
              --name FileSearchPro \
              --icon=assets/search_icon.ico \
              main.py
          else
            pyinstaller --noconfirm --clean --onefile \
              --upx-exclude "libtorch.so" --upx-exclude "libtorch_cpu.so" --upx-exclude "libtorch.dylib" --upx-exclude "libtorch_cpu.dylib" \
              --name FileSearchPro \
              --icon=assets/search_icon.ico \
              main.py
          fi

      - name: 7. Build Installer using Inno Setup (Windows Only)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          iscc installer.iss

      - name: 8. Rename output file & Prepare Upload
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            ARTIFACT_NAME="FileSearchPro_Setup_v${VERSION}_Windows_x64.exe"
            mkdir -p final_dist
            mv dist_installer/* final_dist/
            echo "ARTIFACT_PATH=final_dist/*" >> $GITHUB_ENV
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            ARTIFACT_NAME="File-Search-Pro-v${VERSION}-macOS"
            mv dist/FileSearchPro "dist/$ARTIFACT_NAME"
            chmod +x "dist/$ARTIFACT_NAME"
            echo "ARTIFACT_PATH=dist/${ARTIFACT_NAME}" >> $GITHUB_ENV
          else
            ARTIFACT_NAME="File-Search-Pro-v${VERSION}-Linux-x64"
            mv dist/FileSearchPro "dist/$ARTIFACT_NAME"
            chmod +x "dist/$ARTIFACT_NAME"
            echo "ARTIFACT_PATH=dist/${ARTIFACT_NAME}" >> $GITHUB_ENV
          fi
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: 9. Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🎉 New release of **File Content Search Pro**

            ✅ Built using PyInstaller  
            ✅ UPX compression enabled for all OS  
            ✅ Includes support for Windows, macOS, and Linux

            Download the appropriate version for your OS below.
          files: artifacts/*/*
